<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAPI Admin{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --orange: #E8682A;
      --bg-dark: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-sidebar: #141414;
      --border: #2a2a2a;
      --text-muted: #888;
    }
    body { background: var(--bg-dark); color: #e8e8e8; font-family: 'Segoe UI', system-ui, sans-serif; }
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--bg-sidebar);
      border-right: 1px solid var(--border); position: fixed; top: 0; left: 0;
      display: flex; flex-direction: column;
    }
    .sidebar-logo {
      padding: 20px 24px; font-size: 1.3rem; font-weight: 800;
      color: var(--orange); border-bottom: 1px solid var(--border);
      letter-spacing: -0.5px;
    }
    .sidebar-logo span { color: #666; font-weight: 400; font-size: 0.75rem; display: block; margin-top: 2px; }
    .sidebar nav { padding: 12px 0; flex: 1; }
    .nav-item a {
      display: flex; align-items: center; gap: 10px; padding: 10px 24px;
      color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
      transition: all 0.15s;
    }
    .nav-item a:hover, .nav-item a.active { color: #fff; background: #1e1e1e; }
    .nav-item a.active { border-left: 3px solid var(--orange); color: var(--orange); }
    .nav-item a i { font-size: 1rem; }
    .sidebar-footer { padding: 16px 24px; border-top: 1px solid var(--border); }
    .sidebar-footer a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
    .main-content { margin-left: 240px; padding: 32px; min-height: 100vh; }
    .page-header { margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .card-header {
      background: transparent; border-bottom: 1px solid var(--border);
      padding: 14px 20px; font-weight: 600; font-size: 0.9rem;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 24px;
    }
    .stat-card .stat-value { font-size: 2rem; font-weight: 800; }
    .stat-card .stat-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .stat-icon { font-size: 1.5rem; opacity: 0.4; }
    .table { color: #e8e8e8; }
    .table thead th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; border-color: var(--border); font-weight: 600; }
    .table td, .table th { border-color: var(--border); padding: 12px 16px; vertical-align: middle; }
    .table tbody tr:hover { background: #1e1e1e; }
    .badge-active { background: #1a3a1a; color: #4ade80; border: 1px solid #2d5a2d; }
    .badge-revoked { background: #3a1a1a; color: #f87171; border: 1px solid #5a2d2d; }
    .badge-expired { background: #2a2a1a; color: #facc15; border: 1px solid #4a4a2d; }
    .badge-status { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .btn-orange { background: var(--orange); color: white; border: none; }
    .btn-orange:hover { background: #d45a20; color: white; }
    .form-control, .form-select {
      background: #222; border: 1px solid var(--border); color: #e8e8e8;
      border-radius: 6px;
    }
    .form-control:focus, .form-select:focus {
      background: #222; border-color: var(--orange); color: #e8e8e8;
      box-shadow: 0 0 0 2px rgba(232,104,42,0.2);
    }
    .log-ok { color: #4ade80; }
    .log-error { color: #f87171; }
    .font-mono { font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8rem; }
    .key-display {
      background: #111; border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px; font-family: monospace; font-size: 0.85rem; color: var(--orange);
      letter-spacing: 1px;
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo">
      WAPI <span>Admin Dashboard</span>
    </div>
    <nav>
      <div class="nav-item">
        <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint == 'admin_dashboard' }}">
          <i class="bi bi-grid-1x2-fill"></i> Übersicht
        </a>
      </div>
      <div class="nav-item">
        <a href="{{ url_for('admin_customers') }}" class="{{ 'active' if 'customer' in request.endpoint }}">
          <i class="bi bi-people-fill"></i> Kunden
        </a>
      </div>
      <div class="nav-item">
        <a href="{{ url_for('admin_new_customer') }}" class="{{ 'active' if request.endpoint == 'admin_new_customer' }}">
          <i class="bi bi-plus-circle"></i> Lizenz erteilen
        </a>
      </div>
      <div class="nav-item">
        <a href="{{ url_for('admin_activations') }}" class="{{ 'active' if request.endpoint == 'admin_activations' }}">
          <i class="bi bi-laptop"></i> Aktivierungen
        </a>
      </div>
      <div class="nav-item">
        <a href="{{ url_for('admin_logs') }}" class="{{ 'active' if request.endpoint == 'admin_logs' }}">
          <i class="bi bi-journal-text"></i> Webhook-Logs
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      {% if admin_user is defined and admin_user.get('email') %}
      <div style="font-size:0.78rem;color:#666;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
           title="{{ admin_user.email }}">
        <i class="bi bi-person-circle me-1"></i>{{ admin_user.name or admin_user.email }}
      </div>
      {% endif %}
      <a href="{{ url_for('admin_logout') }}"><i class="bi bi-box-arrow-right"></i> Abmelden</a>
    </div>
  </div>

  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
