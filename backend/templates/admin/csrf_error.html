<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>WAPI Admin — Sicherheitsfehler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f0f0f; color: #e8e8e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 40px; max-width: 420px; }
    h2 { color: #f87171; }
  </style>
</head>
<body>
  <div class="card text-center">
    <h2 class="mb-3"><i class="bi bi-shield-x"></i> Sicherheitsfehler</h2>
    <p class="text-muted mb-1">Die Anfrage wurde abgelehnt (CSRF-Schutz).</p>
    <p class="text-muted mb-4" style="font-size:0.85rem">{{ reason }}</p>
    <a href="{{ url_for('admin_dashboard') }}" class="btn" style="background:#E8682A;color:white">
      Zurück zum Dashboard
    </a>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
