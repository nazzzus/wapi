<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>WAPI Admin - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f0f0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 40px; width: 100%; max-width: 380px;
    }
    .login-card h1 { color: #E8682A; font-weight: 800; font-size: 1.8rem; margin-bottom: 4px; }
    .login-card p { color: #888; font-size: 0.85rem; }
    .form-control { background: #222; border: 1px solid #333; color: #e8e8e8; }
    .form-control:focus { background: #222; border-color: #E8682A; color: #e8e8e8; box-shadow: none; }
    .btn-login { background: #E8682A; color: white; border: none; width: 100%; padding: 10px; font-weight: 600; border-radius: 6px; }
    .btn-login:hover { background: #d45a20; color: white; }
    .btn-auth0 {
      background: #635bff; color: white; border: none; width: 100%; padding: 10px;
      font-weight: 600; border-radius: 6px; text-decoration: none; display: block; text-align: center;
    }
    .btn-auth0:hover { background: #4f46e5; color: white; }
    label { color: #aaa; font-size: 0.85rem; }
    .alert-danger { background: #3a1a1a; border-color: #5a2d2d; color: #f87171; }
    .divider { border-color: #333; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>WAPI</h1>
    <p class="mb-4">Admin Dashboard · Anmeldung</p>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
    {% endif %}

    {% if use_auth0 %}
    <!-- Auth0 login button -->
    <a href="{{ url_for('admin_login') }}" class="btn-auth0">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white" style="vertical-align:-3px;margin-right:8px">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
      Mit Auth0 anmelden
    </a>
    {% else %}
    <!-- Password login -->
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="password">Passwort</label>
        <input type="password" class="form-control mt-1" id="password" name="password"
               placeholder="Admin-Passwort eingeben" autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-login">Anmelden</button>
    </form>
    {% endif %}
  </div>
</body>
</html>
